name: Build NDK Runtimes for Android (Self-Hosted NDK Bootstrap)

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04

    env:
      # 用于交叉构建目标 Android (arm64)
      TARGET: aarch64-linux-android
      API: 24
      JOBS: 8

      # 指定你用来 bootstrap 的 NDK 版本
      BOOTSTRAP_NDK_VERSION: 26.1.10909125

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential ninja-build python3 git curl unzip cmake

      - name: Download bootstrap NDK
        run: |
          mkdir $HOME/ndk
          cd $HOME/ndk
          curl -O https://dl.google.com/android/repository/android-ndk-r${BOOTSTRAP_NDK_VERSION}-linux.zip
          unzip android-ndk-r${BOOTSTRAP_NDK_VERSION}-linux.zip
          mv android-ndk-r* ndk
          echo "BOOTSTRAP_NDK=$HOME/ndk/ndk" >> $GITHUB_ENV

      - name: Prepare toolchain paths
        run: |
          TOOLCHAIN=$BOOTSTRAP_NDK/toolchains/llvm/prebuilt/linux-x86_64
          echo "TOOLCHAIN=$TOOLCHAIN" >> $GITHUB_ENV
          echo "SYSROOT=$TOOLCHAIN/sysroot" >> $GITHUB_ENV
          echo "CC=$TOOLCHAIN/bin/${TARGET}${API}-clang" >> $GITHUB_ENV
          echo "CXX=$TOOLCHAIN/bin/${TARGET}${API}-clang++" >> $GITHUB_ENV

      - name: Checkout LLVM/NDK runtimes source
        run: |
          git clone --depth=1 https://github.com/llvm/llvm-project.git llvm-project

      - name: Build Android runtimes using NDK
        run: |
          mkdir build-runtimes
          cd build-runtimes

          cmake -G Ninja ../llvm-project/runtimes \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=$HOME/ndk-out \
            -DCMAKE_SYSROOT=$SYSROOT \
            -DLLVM_ENABLE_RUNTIMES="libunwind;libcxxabi;libcxx;compiler-rt" \
            -DLIBCXXABI_USE_LLVM_UNWINDER=ON \
            -DLIBUNWIND_ENABLE_STATIC=ON \
            -DLIBUNWIND_ENABLE_SHARED=OFF \
            -DCMAKE_SYSTEM_NAME=Android \
            -DCMAKE_ANDROID_ARCH_ABI=arm64-v8a \
            -DCMAKE_ANDROID_NDK=$BOOTSTRAP_NDK \
            -DCMAKE_ANDROID_API=$API \
            -DCMAKE_C_COMPILER=$CC \
            -DCMAKE_CXX_COMPILER=$CXX \
            -DCMAKE_ASM_COMPILER=$CC

          ninja -j${JOBS}
          ninja install

      - name: Upload NDK runtime outputs
        uses: actions/upload-artifact@v4
        with:
          name: ndk-android-runtimes
          path: $HOME/ndk-out
