name: Build LLVM for Termux

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build LLVM/Clang for Termux
    runs-on: ubuntu-latest

    env:
      PREFIX: ${{ github.workspace }}/llvm-install
      NPROC: 8

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git cmake ninja-build build-essential python3 python3-pip wget curl

      - name: Download LLVM source
        run: |
          mkdir -p llvm-project
          cd llvm-project
          git clone --depth 1 --branch llvmorg-18.1.8 https://github.com/llvm/llvm-project.git .

      - name: Configure LLVM with CMake
        run: |
          mkdir -p build && cd build
          cmake -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=${PREFIX} \
            -DLLVM_ENABLE_PROJECTS="clang;lld;compiler-rt;libcxx;libcxxabi" \
            -DLLVM_TARGETS_TO_BUILD="AArch64;X86;ARM" \
            -DLLVM_ENABLE_LTO=OFF \
            -DLLVM_ENABLE_RTTI=ON \
            -DLLVM_ENABLE_EH=ON \
            -DLLVM_ENABLE_LIBCXX=ON \
            ../llvm-project/llvm

      - name: Build and install
        run: |
          cd build
          ninja -j${NPROC}

      - name: Package LLVM for Termux
        run: |
          cd $PREFIX
          tar -czf llvm-termux.tar.gz *
          ls -lh llvm-termux.tar.gz

      - name: Upload project
        uses: actions/upload-artifact@v4
        with:
          name: llvm-termux
          path: llvm-termux.tar.gz
 
