name: Build AOSP NDK (master-ndk)

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04

    env:
      REPO_URL: https://android.googlesource.com/platform/manifest
      REPO_BRANCH: master-ndk
      PYTHON_PREBUILT: prebuilts/python/linux-x86/bin/python3

    steps:
      - name: Checkout self
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y git-core curl python3 python3-pip unzip \
            openjdk-17-jdk build-essential ninja-build ccache rsync \
            python3-venv python3-distutils python3-setuptools

          # install repo tool
          mkdir -p ~/bin
          curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
          chmod +x ~/bin/repo
          echo "$HOME/bin" >> $GITHUB_PATH

      - name: Repo init NDK source
        run: |
          mkdir ndk-src
          cd ndk-src
          repo init -u $REPO_URL -b $REPO_BRANCH --partial-clone
          repo sync -c -j8 --no-tags --no-clone-bundle

      - name: Setup Poetry
        run: |
          pip install --upgrade pip
          pip install poetry

      - name: Setup Python environment for NDK (Poetry)
        working-directory: ndk-src/ndk
        run: |
          poetry env use ../$PYTHON_PREBUILT
          poetry install

      - name: Build NDK
        working-directory: ndk-src/ndk
        run: |
          # enable poetry virtualenv
          source $(poetry env info --path)/bin/activate

          # build NDK (no packaging to save time)
          python checkbuild.py --no-build-tests --permissive-python-environment

      - name: Package NDK (optional)
        if: ${{ github.event.inputs.package == 'true' }}
        working-directory: ndk-src/ndk
        run: |
          source $(poetry env info --path)/bin/activate
          python checkbuild.py --package --permissive-python-environment

      - name: Archive build output
        uses: actions/upload-artifact@v4
        with:
          name: ndk-out
          path: ndk-src/out/dist
