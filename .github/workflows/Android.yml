name: Build GCC for Android

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      TARGET: aarch64-linux-android
      ANDROID_API: 24
      GCC_VERSION: 13.2.0
      BINUTILS_VERSION: 2.41

    steps:
      - name: Install Dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential ninja-build gperf bison flex texinfo \
              libgmp-dev libmpfr-dev libmpc-dev wget curl unzip xz-utils

      - name: Download Android NDK
        run: |
          wget https://dl.google.com/android/repository/android-ndk-r26c-linux.zip
          unzip android-ndk-r26c-linux.zip
          mv android-ndk-r26c ndk

      - name: Prepare sysroot
        run: |
          SYSROOT=$PWD/ndk/toolchains/llvm/prebuilt/linux-x86_64/sysroot
          echo "SYSROOT=$SYSROOT" >> $GITHUB_ENV

      - name: Download GCC & binutils
        run: |
          wget https://ftp.gnu.org/gnu/binutils/binutils-${BINUTILS_VERSION}.tar.xz
          tar xf binutils-${BINUTILS_VERSION}.tar.xz
          wget https://ftp.gnu.org/gnu/gcc/gcc-${GCC_VERSION}/gcc-${GCC_VERSION}.tar.xz
          tar xf gcc-${GCC_VERSION}.tar.xz

      - name: Build binutils
        run: |
          mkdir build-binutils
          cd build-binutils
          ../binutils-${BINUTILS_VERSION}/configure \
            --target=${TARGET} \
            --prefix=$PWD/../toolchain \
            --with-sysroot=$SYSROOT \
            --disable-nls \
            --disable-werror
          make -j$(nproc)
          make install

      - name: Prepare GCC prerequisites
        run: |
          cd gcc-${GCC_VERSION}
          ./contrib/download_prerequisites

      - name: Build GCC stage 1 (C only)
        run: |
          mkdir build-gcc
          cd build-gcc
          ../gcc-${GCC_VERSION}/configure \
            --target=${TARGET} \
            --prefix=$PWD/../toolchain \
            --with-sysroot=$SYSROOT \
            --enable-languages=c \
            --disable-multilib \
            --disable-nls
          make all-gcc -j$(nproc)
          make install-gcc

      - name: Build libgcc
        run: |
          cd build-gcc
          make all-target-libgcc -j$(nproc)
          make install-target-libgcc

      - name: Archive toolchain
        run: |
          cd toolchain
          tar czf ../android-gcc-toolchain.tar.gz .

      - name: Upload artifact
        uses: actions/upload-artifact@v3
        with:
          name: android-gcc-toolchain
          path: android-gcc-toolchain.tar.gz
